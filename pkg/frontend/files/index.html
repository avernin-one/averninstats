<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Minecraft server statistics">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="stylesheet" href="/assets/css/style.css">
  <title></title>
</head>

<body>

  <nav id="top" aria-label="Top Navigation">
    <a href="#/highscore" class="left hidden">averninstats</a>
    <button id="mobile-toc-toggle" class="left hidden">☰</button>
    <div class="navigation">
      <a href="#/highscore" class="nav-link active" data-id="highscore">Highscore</a>
      <a href="#/block" class="nav-link" data-id="block">Block</a>
      <a href="#/item" class="nav-link" data-id="item">Item</a>
      <a href="#/entity" class="nav-link" data-id="entity">Entity</a>
      <a href="#/player" class="nav-link" data-id="player">Player</a>
    </div>

    <div class="right hidden">
      <div class="links"></div>

      <span id="language-switcher">🌐
        <ul id="language" class="hidden" tabindex="0"></ul>
      </span>

      <span id="theme-button">🌕</span>
    </div>

    <span id="mobile-extra-toggle" class="hidden">⛶</span>
  </nav>

  <nav id="toc" class="hidden" aria-label="TOC Navigation">
    <input id="toc-search" type="search" placeholder="Filter..." aria-label="Filter stats">
    <div id="toc-list"></div>
  </nav>

  <main id="main"></main>

  <footer id="footer"></footer>

  <script type="module" src="assets/js/app.js"></script>
</body>

</html>
