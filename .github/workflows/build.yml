---
name: 📦 Build Artifacts

on:
  workflow_call:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  GO_VERSION: "1.26"

jobs:
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        OS:
          - linux
          - darwin
          - windows
        ARCH:
          - arm
          - arm64
          - amd64
          - 386
        exclude:
          - OS: darwin
            ARCH: 386
          - OS: darwin
            ARCH: arm
    steps:
      - name: 🔽 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗️ Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 📦 Go Build
        id: build
        run: |
          set -e -o pipefail

          export CGO_ENABLED=0
          export GOOS="${{ matrix.OS }}"
          export GOARCH="${{ matrix.ARCH }}"

          export APP_NAME="$(basename $(pwd))"
          export BUILD="${APP_NAME}-${GOOS}-${GOARCH}"
          export VERSION="$(git describe --tags --dirty  --always)"
          export GIT_COMMIT="$(git rev-parse --short HEAD)"
          export BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export PKG_PREFIX="$(sed -rn 's/^module (.*)$/\1/p' go.mod)"

          echo "building: ${BUILD}"

          go build -o dist/ -ldflags "-s -w -trimpath \
            -X '${PKG_PREFIX}/pkg/config.version=${VERSION}' \
            -X '${PKG_PREFIX}/pkg/config.gitCommit=${GIT_COMMIT}' \
            -X '${PKG_PREFIX}/pkg/config.buildDate=${BUILD_DATE}'" \

          echo "listing build... " && ls -lah dist/

          [[ ${GOOS} == windows ]] && SUFFIX=".exe" || SUFFIX=""
          mv dist/${APP_NAME}${SUFFIX} dist/${BUILD}${SUFFIX}

          echo "bin_name=${BUILD}${SUFFIX}" >> $GITHUB_OUTPUT

      - name: 🚚 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.bin_name }}
          path: dist/
