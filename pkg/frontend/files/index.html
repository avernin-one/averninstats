<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Minecraft server statistics">
  <link rel=icon type=image/png href="/images/favicon.png">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

  <nav class="topnav" aria-label="Site menu">
    <a href="#/highscore" class="logo">averninstats</a>

    </div>

    <div class="topnav-right">
      <ul class="ext-links"></ul>
      <div>
        <p id="languageSwitcher">🌐</p>
        <ul name="language" id="language" tabindex="0"></ul>

  </nav>

  <div id="app">

  <footer></footer>
