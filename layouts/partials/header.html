<div class="header_left">
  <a href="/highscores" class="nohover">{{ .Site.Title }}</a>
</div>
<div class="header_right">
  {{- if and .Site.Params.header.extraLinks (gt (.Site.Params.header.extraLinks | len) 0) }}
    {{- range $elem := .Site.Params.header.extraLinks }}
  <a href="{{ $elem.url }}" target="{{ $elem.target }}">{{ $elem.name }}</a> |
    {{- end }}
  {{- end }}
  <button id="toggleButton"></button>
</div>
