{{- if eq .Section "highscores" }}
  {{- with .Site.GetPage .Section }}
<div class="stats_grid">
    {{- range .Pages }}
      {{- partials.Include "stats_grid" . }}
    {{- end }}
  {{- end }}
{{- else }}
  <h2>{{ T .LinkTitle }}</h2>
  <div class="stats_grid">
    {{- partials.Include "stats_grid" . }}
    {{- end }}
  </div>
